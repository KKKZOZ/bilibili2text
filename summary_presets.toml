default = "timeline_merge"

[presets.timeline_merge]
label = "金融时间线主题归并"
prompt_template = """
请将下面的金融博主投资记录转录整理为纯 Markdown 正文。

正文要求：
1. 按时间线分段总结；如果相邻时间段讨论的是同一主题，请合并为一个小节。
2. 只保留和投资相关的信息：标的、买卖/持仓变化、投资逻辑、估值判断、涨跌表现、风险与后续预期。
3. 必须保留关键数字，例如涨跌幅、估值、股息率、营收/利润变化、市值、仓位变化等。
4. 删除闲聊、生活细节、重复口癖和无关背景。

文末必须追加一个 Markdown 表格，列名固定为：
股票名称 | 股票代码 | 板块 | 投资逻辑/估值情况 | 涨跌/持仓变动 | 预期/风险点

表格规则：
1. 股票名称必须尽量使用正式证券简称；不要在“股票名称”列写“推断为”“疑似”“可能是”“类似”等说明文字。
2. 如果转录中的名称明显是音近或错别字，请直接修正为最可能的正式证券简称。例如：蓝起/蓝企科技=澜起科技，天悦新=天岳先进，百威存储=佰维存储。
3. 股票代码格式必须为 600000.SH、000001.SZ、00700.HK。只有在你能同时确认“正式证券简称”和“股票代码”互相对应时，才填写股票代码。
4. 如果名称不确定、代码不确定、或名称与代码无法确认对应关系，股票代码必须填写“-”。
5. 如果无法确定正式简称，股票名称填写转录原文中的名称，不要附加括号推断说明。
6. 禁止写成“蓝企科技 (推断为澜起科技) | 688008.SH”。正确写法只能是“澜起科技 | 688008.SH”；如果不确定，则写“蓝企科技 | -”。
7. 如果一家公司同时在 A 股和港股上市，除非文本明确指向 A 股，否则优先填写港股代码。
8. 文本中提到的具体数据必须体现在对应标的的表格单元格中；缺失信息用“-”。

{content}
"""

[presets.timeline_merge_for_ben]
label = "金融时间线主题归并(笨总特调版)"
prompt_template = """
按照文本时间分段总结；如果相邻时间段主题一致，请合并为一个小节。
输出要求：
1. 输出必须是纯 Markdown 正文；
2. 保留关键事实、观点与结论，关于数值的细节部分需要保留
3. 关于保留什么，我给你的是一个金融博主的投资记录转录，所以你的总结的内容也应该围绕着投资的逻辑来，比如他投资了什么标的，为什么投资，投资的逻辑是什么，投资的结果是什么，未来的预期是什么等等；如果有一些无关紧要的内容，比如他吃了什么，或者说了一些无关紧要的话，这些都不需要保留；
4. 额外的，在末尾用 md 表格形式呈现：提及的标的总结，应该包含股票名称，股票代码，板块，投资逻辑/估值情况，涨跌/持仓变动，预期/风险点；如果标的在有具体的数据，必须体现在表格中
5. 股票代码的格式为 600000.SH, 000001.SZ, 00700.HK，股票代码应该是从股票名称中推断出来的，如果股票名称本身不确定，就不用推断, 如果一家公司在 A 股和港股都上了市，则优先提供港股代码
6. 对于一些名称不清楚的标的，如果能够推断，给出推断后的名字
7. 音频转录时对于一些股票名称可能会转录错误，你可以参考这个博主的持仓进行修正和联想：浙江臻镭科技 东芯股份 澜起科技 速腾聚创 思特威电子科技 中芯国际 国能日新 立昂微 天岳先进 海光信息 通富微电 阿特斯阳光电力 龙芯中科 锦浪科技 风华高科 思瑞浦 中际联合 禾望电气 融捷股份 兆易创新 阿里巴巴 *ST铖昌 中创新航 南都电源

{content}
"""


[presets.financial_blog]
label = "金融博客"
prompt_template = """
给定一个金融博主的投资记录转录，你应该将其转化为一个金融博客文章，
用专业但易读的中文写作，既保留投资逻辑，也保证可读性。
输出要求：
1. 仅输出 Markdown 正文，不要添加额外说明；
2. 文章结构建议为：开篇观点摘要、市场/板块观察、重点标的分析、仓位与交易变化、风险与后续计划；
3. 必须保留关键信息：投资标的、买卖动作、仓位变化、核心逻辑、估值判断、关键数据、预期与风险；
4. 对于口语化、重复、与投资无关的内容（闲聊、跑题）要删除；
5. 如果原文中出现明确时间点或价格区间，请尽量保留；
6. 对于提到的标的，应该在文中对应位置提供 Markdown 表格，列为：股票名称，板块，投资逻辑/估值情况，涨跌/持仓变动，预期/风险点。
7. 对于一些名称不清楚的标的，如果能够推断，给出推断后的名字

{content}
"""

[presets.key_points]
label = "关键观点提炼"
prompt_template = """
请基于以下转录内容提炼关键观点，并按主题组织为 Markdown 小节。
输出要求：
1. 仅输出 Markdown 正文；
2. 每个小节先给结论，再给必要依据；
3. 避免空泛复述，保留可执行信息和关键判断；
4. 不要输出额外说明。

{content}
"""

[presets.study_notes]
label = "学习笔记"
prompt_template = """
请将以下转录内容整理为结构化学习笔记（Markdown）：
1. 先给“主题概览”；
2. 再按逻辑分节整理要点；
3. 最后给“可复习清单”（3-8 条）；
4. 只输出 Markdown 正文，不要多余前后缀。

{content}
"""
