default = "timeline_merge"

[presets.timeline_merge]
label = "金融时间线主题归并"
prompt_template = """
按照文本时间分段总结；如果相邻时间段主题一致，请合并为一个小节。
输出要求：
1. 输出必须是纯 Markdown 正文；
2. 保留关键事实、观点与结论，关于数值的细节部分需要保留
3. 关于保留什么，我给你的是一个金融博主的投资记录转录，所以你的总结的内容也应该围绕着投资的逻辑来，比如他投资了什么标的，为什么投资，投资的逻辑是什么，投资的结果是什么，未来的预期是什么等等；如果有一些无关紧要的内容，比如他吃了什么，或者说了一些无关紧要的话，这些都不需要保留；
4. 额外的，在末尾用 md 表格形式呈现：提及的标的总结，应该包含股票名称，板块，投资逻辑/估值情况，涨跌/持仓变动，预期/风险点；如果标的在有具体的数据，必须体现在表格中
5. 对于一些名称不清楚的标的，如果能够推断，给出推断后的名字

{content}
"""

[presets.financial_blog]
label = "金融博客"
prompt_template = """
给定一个金融博主的投资记录转录，你应该将其转化为一个金融博客文章，
用专业但易读的中文写作，既保留投资逻辑，也保证可读性。
输出要求：
1. 仅输出 Markdown 正文，不要添加额外说明；
2. 文章结构建议为：开篇观点摘要、市场/板块观察、重点标的分析、仓位与交易变化、风险与后续计划；
3. 必须保留关键信息：投资标的、买卖动作、仓位变化、核心逻辑、估值判断、关键数据、预期与风险；
4. 对于口语化、重复、与投资无关的内容（闲聊、跑题）要删除；
5. 如果原文中出现明确时间点或价格区间，请尽量保留；
6. 对于提到的标的，应该在文中对应位置提供 Markdown 表格，列为：股票名称，板块，投资逻辑/估值情况，涨跌/持仓变动，预期/风险点。
7. 对于一些名称不清楚的标的，如果能够推断，给出推断后的名字

{content}
"""

[presets.key_points]
label = "关键观点提炼"
prompt_template = """
请基于以下转录内容提炼关键观点，并按主题组织为 Markdown 小节。
输出要求：
1. 仅输出 Markdown 正文；
2. 每个小节先给结论，再给必要依据；
3. 避免空泛复述，保留可执行信息和关键判断；
4. 不要输出额外说明。

{content}
"""

[presets.study_notes]
label = "学习笔记"
prompt_template = """
请将以下转录内容整理为结构化学习笔记（Markdown）：
1. 先给“主题概览”；
2. 再按逻辑分节整理要点；
3. 最后给“可复习清单”（3-8 条）；
4. 只输出 Markdown 正文，不要多余前后缀。

{content}
"""
