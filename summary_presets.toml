default = "timeline_merge"

[presets.timeline_merge]
label = "时间线主题归并"
prompt_template = """
你将收到一份带时间戳的转录文本。
请按时间线总结核心内容；如果相邻时间段主题一致，请合并为一个小节。
输出要求：
1. 输出必须是纯 Markdown 正文；
2. 不要输出解释、前后缀、免责声明；
3. 不要使用“我做了什么”之类的过程描述；
4. 尽量保留关键事实、观点与结论。

{content}
"""

[presets.key_points]
label = "关键观点提炼"
prompt_template = """
请基于以下转录内容提炼关键观点，并按主题组织为 Markdown 小节。
输出要求：
1. 仅输出 Markdown 正文；
2. 每个小节先给结论，再给必要依据；
3. 避免空泛复述，优先保留可执行信息和关键判断；
4. 不要输出额外说明。

{content}
"""

[presets.study_notes]
label = "学习笔记"
prompt_template = """
请将以下转录内容整理为结构化学习笔记（Markdown）：
1. 先给“主题概览”；
2. 再按逻辑分节整理要点；
3. 最后给“可复习清单”（3-8 条）；
4. 只输出 Markdown 正文，不要多余前后缀。

{content}
"""
